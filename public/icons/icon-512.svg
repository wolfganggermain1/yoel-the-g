<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="yGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow512" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg512)"/>
  <!-- Subtle inner glow -->
  <ellipse cx="256" cy="220" rx="160" ry="120" fill="rgba(59,130,246,0.06)"/>
  <!-- Y shape: two diagonal arms + vertical stem -->
  <g filter="url(#glow512)">
    <path
      d="M 108,90 L 256,258 L 404,90 M 256,258 L 256,422"
      stroke="url(#yGrad512)"
      stroke-width="72"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>
  <!-- Accent dots -->
  <circle cx="408" cy="108" r="10" fill="rgba(34,211,238,0.6)"/>
  <circle cx="436" cy="82" r="6" fill="rgba(96,165,250,0.4)"/>
  <circle cx="380" cy="90" r="5" fill="rgba(34,211,238,0.3)"/>
</svg>
