<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="textGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow512" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad512)"/>
  <!-- Soft ambient glow -->
  <ellipse cx="256" cy="248" rx="190" ry="150" fill="rgba(59,130,246,0.07)" filter="url(#glow512)"/>
  <!-- YTG shadow for depth -->
  <text x="259" y="291" font-family="Fredoka, 'Fredoka One', 'Arial Rounded MT Bold', 'Varela Round', sans-serif" font-size="230" font-weight="700" letter-spacing="-6" fill="rgba(0,0,0,0.35)" text-anchor="middle" dominant-baseline="middle">YTG</text>
  <!-- YTG main gradient text -->
  <text x="256" y="288" font-family="Fredoka, 'Fredoka One', 'Arial Rounded MT Bold', 'Varela Round', sans-serif" font-size="230" font-weight="700" letter-spacing="-6" fill="url(#textGrad512)" filter="url(#glow512)" text-anchor="middle" dominant-baseline="middle">YTG</text>
  <!-- GAMES subtitle -->
  <text x="256" y="422" font-family="Fredoka, 'Fredoka One', 'Arial Rounded MT Bold', sans-serif" font-size="44" font-weight="500" letter-spacing="8" fill="rgba(255,255,255,0.30)" text-anchor="middle" dominant-baseline="middle">GAMES</text>
  <!-- Accent dots top-right -->
  <circle cx="412" cy="102" r="9" fill="rgba(6,182,212,0.55)"/>
  <circle cx="438" cy="78" r="5" fill="rgba(59,130,246,0.45)"/>
  <circle cx="382" cy="86" r="4" fill="rgba(6,182,212,0.35)"/>
  <!-- Accent dots bottom-left -->
  <circle cx="98" cy="414" r="7" fill="rgba(59,130,246,0.45)"/>
  <circle cx="74" cy="438" r="4" fill="rgba(6,182,212,0.35)"/>
</svg>
