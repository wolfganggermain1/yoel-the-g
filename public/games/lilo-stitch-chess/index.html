<script>
// ============================================================
// PLATFORM THEME INTEGRATION
// ============================================================
let platformTheme = 'blue-light';
try { platformTheme = window.parent.document.documentElement.getAttribute('data-theme') || 'blue-light'; } catch(e) {}
const THEMES = {
  'blue-light':  { primary: '#3b82f6', dark: '#1e40af', bg: '#f0f7ff', surface: '#ffffff', text: '#1e293b', accent: '#93c5fd', glow: 'rgba(59,130,246,0.4)' },
  'blue-dark':   { primary: '#60a5fa', dark: '#2563eb', bg: '#0f172a', surface: '#1e293b', text: '#e2e8f0', accent: '#1e3a5f', glow: 'rgba(96,165,250,0.3)' },
  'red-light':   { primary: '#ef4444', dark: '#991b1b', bg: '#fff5f5', surface: '#ffffff', text: '#1e293b', accent: '#fca5a5', glow: 'rgba(239,68,68,0.4)' },
  'red-dark':    { primary: '#f87171', dark: '#dc2626', bg: '#1a0a0a', surface: '#2d1515', text: '#fecaca', accent: '#4a1515', glow: 'rgba(248,113,113,0.3)' },
};
const theme = THEMES[platformTheme] || THEMES['blue-light'];

// XP Reporting
let xpTimer = 0;
function reportXP() { try { window.parent.postMessage({ type: 'xp', amount: 10 }, '*'); } catch(e) {} }
function onGameOver(finalScore) { try { window.parent.postMessage({ type: 'gameOver', score: finalScore }, '*'); } catch(e) {} }

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, sqSize, boardX, boardY, boardSize;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Board sizing - leave room for UI above and below
  let topMargin = W > H ? 40 : 90;
  let bottomMargin = W > H ? 50 : 120;
  let sideMargin = W > H ? 8 : 16;
  let availW = W - sideMargin * 2;
  let availH = H - topMargin - bottomMargin;
  boardSize = Math.min(availW, availH);
  boardSize = Math.min(boardSize, 600); // cap for large screens
  sqSize = Math.floor(boardSize / 8);
  boardSize = sqSize * 8;
  boardX = Math.floor((W - boardSize) / 2);
  boardY = topMargin + Math.floor((availH - boardSize) / 2);
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
let muted = false;

function initAudio() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

function playSound(type) {
  if (muted || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    switch(type) {
      case 'move':
        osc.type = 'sine'; osc.frequency.setValueAtTime(440, t);
        osc.frequency.linearRampToValueAtTime(520, t + 0.06);
        gain.gain.setValueAtTime(0.15, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
        osc.start(t); osc.stop(t + 0.1); break;
      case 'capture':
        osc.type = 'triangle'; osc.frequency.setValueAtTime(300, t);
        osc.frequency.linearRampToValueAtTime(600, t + 0.1);
        osc.frequency.linearRampToValueAtTime(800, t + 0.15);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
        osc.start(t); osc.stop(t + 0.2); break;
      case 'check':
        osc.type = 'square'; osc.frequency.setValueAtTime(600, t);
        osc.frequency.setValueAtTime(400, t + 0.1);
        osc.frequency.setValueAtTime(600, t + 0.2);
        gain.gain.setValueAtTime(0.12, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3); break;
      case 'gameover':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(659, t + 0.15);
        osc.frequency.setValueAtTime(784, t + 0.3);
        osc.frequency.setValueAtTime(1047, t + 0.45);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.6);
        osc.start(t); osc.stop(t + 0.6); break;
      case 'lose':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(200, t + 0.2);
        osc.frequency.linearRampToValueAtTime(100, t + 0.5);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.6);
        osc.start(t); osc.stop(t + 0.6); break;
      case 'select':
        osc.type = 'sine'; osc.frequency.setValueAtTime(660, t);
        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.08);
        osc.start(t); osc.stop(t + 0.08); break;
      case 'invalid':
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
        gain.gain.setValueAtTime(0.08, t); gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15); break;
      case 'levelup':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(659, t + 0.1);
        osc.frequency.setValueAtTime(784, t + 0.2);
        osc.frequency.setValueAtTime(1047, t + 0.3);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.45);
        osc.start(t); osc.stop(t + 0.45); break;
    }
  } catch(e) {}
}

// ============================================================
// GAME STATE
// ============================================================
let chess = null;
let state = 'start'; // start, playing, thinking, gameover, promote
let selectedSquare = null;
let validMoves = [];
let lastMoveFrom = null;
let lastMoveTo = null;
let score = 0;
let level = 1;
let maxLevel = 3;
let timer = 0;
let titlePulse = 0;
let lastTime = 0;
let capturedByPlayer = []; // pieces player captured
let capturedByAI = []; // pieces AI captured
let gameMessage = '';
let messageTimer = 0;
let aiDelay = 0;
let scorePop = 0;
let checkSquare = null; // square of king in check
let moveAnim = null; // {piece, color, fromX, fromY, toX, toY, progress}
let particles = [];

// Floating texts
let floatingTexts = [];
function addFloat(x, y, text, color) { floatingTexts.push({x, y, text, color, life: 1.2, vy: -40}); }

// Piece point values for scoring
const PIECE_VALUES = { p: 10, n: 30, b: 30, r: 50, q: 90 };

// Character names for pieces
const PIECE_NAMES = {
  w: { k: 'Stitch', q: 'Lilo', b: 'Angel', n: 'Scrump', r: 'Tiki', p: 'Flower' },
  b: { k: 'Gantu', q: 'Hamster', b: 'Reuben', n: 'Sparky', r: 'Tower', p: 'Coconut' }
};

// ============================================================
// PIECE DRAWING FUNCTIONS
// ============================================================
// Each function: (cx, cy, r) where cx,cy = center, r = radius (~sqSize*0.38)

// === WHITE PIECES (Stitch's team - Blue) ===
// All pieces shaped like real chess pieces with Stitch-blue color + subtle character accents

function drawStitch(cx, cy, r) {
  // KING - classic chess king shape in Stitch blue
  let lw = Math.max(1, r*0.04);
  // Base
  ctx.fillStyle = '#4169E1';
  ctx.beginPath();
  ctx.moveTo(cx - r*0.45, cy + r*0.75);
  ctx.lineTo(cx + r*0.45, cy + r*0.75);
  ctx.lineTo(cx + r*0.38, cy + r*0.55);
  ctx.lineTo(cx - r*0.38, cy + r*0.55);
  ctx.closePath(); ctx.fill();
  // Pedestal ring
  ctx.fillStyle = '#5B8DEF';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r*0.55, r*0.38, r*0.08, 0, 0, Math.PI*2); ctx.fill();
  // Body column
  ctx.fillStyle = '#4169E1';
  ctx.beginPath();
  ctx.moveTo(cx - r*0.28, cy + r*0.55);
  ctx.quadraticCurveTo(cx - r*0.18, cy + r*0.1, cx - r*0.22, cy - r*0.15);
  ctx.lineTo(cx + r*0.22, cy - r*0.15);
  ctx.quadraticCurveTo(cx + r*0.18, cy + r*0.1, cx + r*0.28, cy + r*0.55);
  ctx.closePath(); ctx.fill();
  // Head/crown base
  ctx.fillStyle = '#5B8DEF';
  ctx.beginPath(); ctx.arc(cx, cy - r*0.25, r*0.28, 0, Math.PI*2); ctx.fill();
  // Cross on top (king symbol)
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(cx - r*0.04, cy - r*0.7, r*0.08, r*0.32);
  ctx.fillRect(cx - r*0.12, cy - r*0.6, r*0.24, r*0.08);
  // Stitch ears (character accent)
  ctx.fillStyle = '#4169E1';
  ctx.beginPath(); ctx.ellipse(cx - r*0.32, cy - r*0.55, r*0.08, r*0.2, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + r*0.32, cy - r*0.55, r*0.08, r*0.2, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath(); ctx.ellipse(cx - r*0.32, cy - r*0.55, r*0.04, r*0.12, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + r*0.32, cy - r*0.55, r*0.04, r*0.12, 0.3, 0, Math.PI*2); ctx.fill();
  // Face dots (Stitch eyes)
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - r*0.1, cy - r*0.28, r*0.045, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r*0.1, cy - r*0.28, r*0.045, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(cx - r*0.08, cy - r*0.3, r*0.02, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r*0.12, cy - r*0.3, r*0.02, 0, Math.PI*2); ctx.fill();
  // Outline
  ctx.strokeStyle = '#2a4cb8'; ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(cx - r*0.45, cy + r*0.75); ctx.lineTo(cx + r*0.45, cy + r*0.75);
  ctx.stroke();
}

function drawLilo(cx, cy, r) {
  // QUEEN - classic chess queen shape in Stitch blue
  let lw = Math.max(1, r*0.04);
  // Base
  ctx.fillStyle = '#4169E1';
  ctx.beginPath();
  ctx.moveTo(cx - r*0.45, cy + r*0.75);
  ctx.lineTo(cx + r*0.45, cy + r*0.75);
  ctx.lineTo(cx + r*0.38, cy + r*0.55);
  ctx.lineTo(cx - r*0.38, cy + r*0.55);
  ctx.closePath(); ctx.fill();
  // Pedestal ring
  ctx.fillStyle = '#5B8DEF';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r*0.55, r*0.38, r*0.08, 0, 0, Math.PI*2); ctx.fill();
  // Body column
  ctx.fillStyle = '#4169E1';

  ctx.moveTo(cx - r*0.28, cy + r*0.55);

function drawDarkTiki(cx, cy, r) {

function drawCoconut(cx, cy, r) {

// Piece draw dispatch
const PIECE_DRAW = {
  w: { k: drawStitch, q: drawLilo, b: drawAngel, n: drawScrump, r: drawTiki, p: drawHibiscus },
  b: { k: drawGantu, q: drawHamsterviel, b: drawReuben, n: drawSparky, r: drawDarkTiki, p: drawCoconut }
};

function drawPiece(type, color, cx, cy, size) {
  let r = size * 0.42;
  let fn = PIECE_DRAW[color] && PIECE_DRAW[color][type];
  if (fn) fn(cx, cy, r);
}

// ============================================================
// BOARD DRAWING
// ============================================================
const LIGHT_SQ = '#F5DEB3';  // sandy tan
const DARK_SQ = '#5F9EA0';   // ocean teal
const SELECT_COLOR = 'rgba(255, 215, 0, 0.6)';
const MOVE_DOT = 'rgba(76, 175, 80, 0.7)';
const CAPTURE_RING = 'rgba(255, 80, 80, 0.7)';
const LAST_MOVE = 'rgba(100, 200, 255, 0.35)';
const CHECK_COLOR = 'rgba(255, 50, 50, 0.5)';

function drawBoard() {
  // Wooden border
  ctx.fillStyle = '#6B4226';
  ctx.fillRect(boardX - 6, boardY - 6, boardSize + 12, boardSize + 12);
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(boardX - 3, boardY - 3, boardSize + 6, boardSize + 6);

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      let x = boardX + col * sqSize;
      let y = boardY + row * sqSize;
      let isLight = (row + col) % 2 === 0;

      // Base square color
      ctx.fillStyle = isLight ? LIGHT_SQ : DARK_SQ;
      ctx.fillRect(x, y, sqSize, sqSize);

      let sq = String.fromCharCode(97 + col) + (8 - row);

      // Last move highlight
      if (sq === lastMoveFrom || sq === lastMoveTo) {
        ctx.fillStyle = LAST_MOVE;
        ctx.fillRect(x, y, sqSize, sqSize);
      }

      // Check highlight
      if (sq === checkSquare) {
        ctx.fillStyle = CHECK_COLOR;
        ctx.fillRect(x, y, sqSize, sqSize);
      }

      // Selected square
      if (sq === selectedSquare) {
        ctx.fillStyle = SELECT_COLOR;
        ctx.fillRect(x, y, sqSize, sqSize);
        // Glow border
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(x + 1, y + 1, sqSize - 2, sqSize - 2);
      }
    }
  }

  // Valid move indicators
  for (let move of validMoves) {
    let col = move.to.charCodeAt(0) - 97;
    let row = 8 - parseInt(move.to[1]);
    let x = boardX + col * sqSize + sqSize / 2;
    let y = boardY + row * sqSize + sqSize / 2;

    if (move.captured) {
      // Capture ring
      ctx.strokeStyle = CAPTURE_RING;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(x, y, sqSize * 0.4, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      // Move dot (big for kids)
      ctx.fillStyle = MOVE_DOT;
      ctx.beginPath();
      ctx.arc(x, y, sqSize * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw coordinates (small, subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.font = Math.max(11, sqSize * 0.22) + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  for (let col = 0; col < 8; col++) {
    ctx.fillText('abcdefgh'[col], boardX + col * sqSize + 2, boardY + boardSize + 2);
  }
  ctx.textAlign = 'right';
  for (let row = 0; row < 8; row++) {
    ctx.fillText(String(8 - row), boardX - 4, boardY + row * sqSize + 2);
  }
}

function drawPieces() {
  if (!chess) return;
  let board = chess.board();
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      let piece = board[row][col];
      if (!piece) continue;

      let sq = String.fromCharCode(97 + col) + (8 - row);

      // Skip piece being animated
      if (moveAnim && sq === moveAnim.toSq) continue;

      let cx = boardX + col * sqSize + sqSize / 2;
      let cy = boardY + row * sqSize + sqSize / 2;

      ctx.save();
      drawPiece(piece.type, piece.color, cx, cy, sqSize);
      ctx.restore();
    }
  }

  // Draw animated piece
  if (moveAnim) {
    let p = moveAnim.progress;
    let cx = moveAnim.fromX + (moveAnim.toX - moveAnim.fromX) * p;
    let cy = moveAnim.fromY + (moveAnim.toY - moveAnim.fromY) * p;
    // Slight arc
    cy -= Math.sin(p * Math.PI) * sqSize * 0.3;
    ctx.save();
    drawPiece(moveAnim.type, moveAnim.color, cx, cy, sqSize);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count && particles.length < 50; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*120, vy: (Math.random()-0.5)*120 - 30,
      life: 0.6 + Math.random()*0.4, maxLife: 0.6 + Math.random()*0.4,
      color, size: 3 + Math.random()*4
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 150 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// FLOATING TEXTS
// ============================================================
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    let f = floatingTexts[i];
    f.y += f.vy * dt; f.life -= dt;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  for (let f of floatingTexts) {
    ctx.globalAlpha = Math.min(1, f.life);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// AI ENGINE
// ============================================================
function aiPickMove() {
  if (!chess || chess.game_over()) return null;
  let moves = chess.moves({ verbose: true });
  if (moves.length === 0) return null;

  if (level === 1) {
    // Random
    return moves[Math.floor(Math.random() * moves.length)];
  }

  if (level === 2) {
    // Prefer captures, then random
    let captures = moves.filter(m => m.captured);
    if (captures.length > 0 && Math.random() < 0.7) {
      // Pick highest value capture
      captures.sort((a, b) => (PIECE_VALUES[b.captured] || 0) - (PIECE_VALUES[a.captured] || 0));
      return captures[0];
    }
    return moves[Math.floor(Math.random() * moves.length)];
  }

  if (level === 3) {
    // Simple 1-ply evaluation
    let bestScore = -Infinity;
    let bestMoves = [];
    let vals = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };

    for (let move of moves) {
      chess.move(move.san);
      let sc = 0;
      let b = chess.board();
      for (let row of b) {
        for (let sq of row) {
          if (sq) {
            let v = vals[sq.type];
            sc += sq.color === 'b' ? v : -v;
          }
        }
      }
      // Bonus for checks
      if (chess.in_check()) sc += 0.5;
      chess.undo();

      if (sc > bestScore) {
        bestScore = sc;
        bestMoves = [move];
      } else if (sc === bestScore) {
        bestMoves.push(move);
      }
    }
    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  return moves[Math.floor(Math.random() * moves.length)];
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  chess = new Chess();
  state = 'playing';
  score = 0;
  timer = 0;
  capturedByPlayer = [];
  capturedByAI = [];
  selectedSquare = null;
  validMoves = [];
  lastMoveFrom = null;
  lastMoveTo = null;
  checkSquare = null;
  gameMessage = '';
  messageTimer = 0;
  moveAnim = null;
  particles = [];
  floatingTexts = [];
}

function resetGame() {
  state = 'start';
}

function selectSquare(sq) {
  if (state !== 'playing') return;
  if (chess.turn() !== 'w') return; // Not player's turn

  let board = chess.board();
  let col = sq.charCodeAt(0) - 97;
  let row = 8 - parseInt(sq[1]);
  let piece = board[row][col];

  // If clicking on a valid move destination
  if (selectedSquare && validMoves.some(m => m.to === sq)) {
    makePlayerMove(selectedSquare, sq);
    return;
  }

  // If clicking own piece, select it
  if (piece && piece.color === 'w') {
    selectedSquare = sq;
    validMoves = chess.moves({ square: sq, verbose: true });
    playSound('select');
    return;
  }

  // Clicking empty or opponent piece with no valid move
  if (selectedSquare) {
    playSound('invalid');
  }
  selectedSquare = null;
  validMoves = [];
}

function makePlayerMove(from, to) {
  let moveObj = { from: from, to: to };

  // Check for pawn promotion
  let board = chess.board();
  let fromCol = from.charCodeAt(0) - 97;
  let fromRow = 8 - parseInt(from[1]);
  let piece = board[fromRow][fromCol];
  if (piece && piece.type === 'p' && (to[1] === '8' || to[1] === '1')) {
    moveObj.promotion = 'q';
  }

  // Animate
  let fromScreen = squareToScreen(from);
  let toScreen = squareToScreen(to);

  let result = chess.move(moveObj);
  if (!result) {
    playSound('invalid');
    selectedSquare = null;
    validMoves = [];
    return;
  }

  // Start animation
  moveAnim = {
    type: piece.type, color: piece.color,
    fromX: fromScreen.x, fromY: fromScreen.y,
    toX: toScreen.x, toY: toScreen.y,
    toSq: to, progress: 0, duration: 0.25,
    callback: function() {
      afterPlayerMove(result);
    }
  };

  // Undo the move visually (animation will show it, then re-apply)
  // Actually, the move is already made in chess.js. The animation just moves the visual.
  // We need to handle this differently - keep the move, just animate the visual

  selectedSquare = null;
  validMoves = [];
  lastMoveFrom = from;
  lastMoveTo = to;

  if (result.captured) {
    playSound('capture');
    capturedByPlayer.push({ type: result.captured, color: 'b' });
    let pts = PIECE_VALUES[result.captured] || 10;
    score += pts;
    scorePop = 0.3;
    addFloat(toScreen.x, toScreen.y - 20, '+' + pts, '#FFD700');
    spawnParticles(toScreen.x, toScreen.y, '#FF6347', 8);
  } else {
    playSound('move');
  }
}

function afterPlayerMove(result) {
  moveAnim = null;
  updateCheckState();

  if (chess.game_over()) {
    endGame();
    return;
  }

  // AI turn
  state = 'thinking';
  aiDelay = 0.5 + Math.random() * 0.5;
}

function doAIMove() {
  let move = aiPickMove();
  if (!move) return;

  let fromScreen = squareToScreen(move.from);
  let toScreen = squareToScreen(move.to);

  let board = chess.board();
  let fromCol = move.from.charCodeAt(0) - 97;
  let fromRow = 8 - parseInt(move.from[1]);
  let piece = board[fromRow][fromCol];

  let result = chess.move(move.san);
  if (!result) {
    // Fallback: try with object notation
    let moveObj = { from: move.from, to: move.to };
    if (move.promotion) moveObj.promotion = move.promotion;
    result = chess.move(moveObj);
  }
  if (!result) { state = 'playing'; return; }

  lastMoveFrom = move.from;
  lastMoveTo = move.to;

  moveAnim = {
    type: piece.type, color: piece.color,
    fromX: fromScreen.x, fromY: fromScreen.y,
    toX: toScreen.x, toY: toScreen.y,
    toSq: move.to, progress: 0, duration: 0.3,
    callback: function() {
      moveAnim = null;
      if (result.captured) {
        playSound('capture');
        capturedByAI.push({ type: result.captured, color: 'w' });
        spawnParticles(toScreen.x, toScreen.y, '#4169E1', 6);
      } else {
        playSound('move');
      }
      updateCheckState();
      if (chess.game_over()) {
        endGame();
      } else {
        state = 'playing';
      }
    }
  };
}

function updateCheckState() {
  checkSquare = null;
  if (chess.in_check()) {
    // Find the king of the side to move
    let board = chess.board();
    let turn = chess.turn();
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        let p = board[r][c];
        if (p && p.type === 'k' && p.color === turn) {
          checkSquare = String.fromCharCode(97 + c) + (8 - r);
          break;
        }
      }
    }
    playSound('check');
    showMessage('Check!');
  }
}

function endGame() {
  state = 'gameover';
  if (chess.in_checkmate()) {
    if (chess.turn() === 'b') {
      gameMessage = 'You Win!';
      score += 100 * level;
      playSound('gameover');
      // Level up
      if (level < maxLevel) level++;
    } else {
      gameMessage = 'You Lose!';
      playSound('lose');
    }
  } else if (chess.in_stalemate()) {
    gameMessage = 'Draw - Stalemate!';
    score += 25;
    playSound('move');
  } else if (chess.in_draw()) {
    gameMessage = 'Draw!';
    score += 25;
    playSound('move');
  } else {
    gameMessage = 'Game Over!';
  }
  onGameOver(score);
}

function showMessage(msg) {
  gameMessage = msg;
  messageTimer = 1.5;
}

function undoMove() {
  if (!chess || state !== 'playing') return;
  if (chess.turn() !== 'w') return; // Only undo on player's turn

  // Undo AI move and player move
  let m1 = chess.undo(); // undo AI
  let m2 = chess.undo(); // undo player
  if (m1 && m1.captured) capturedByAI.pop();
  if (m2 && m2.captured) {
    capturedByPlayer.pop();
    score = Math.max(0, score - (PIECE_VALUES[m2.captured] || 10));
  }

  selectedSquare = null;
  validMoves = [];
  checkSquare = null;
  lastMoveFrom = null;
  lastMoveTo = null;
  playSound('move');
}

function squareToScreen(sq) {
  let col = sq.charCodeAt(0) - 97;
  let row = 8 - parseInt(sq[1]);
  return {
    x: boardX + col * sqSize + sqSize / 2,
    y: boardY + row * sqSize + sqSize / 2
  };
}

// ============================================================
// INPUT HANDLING
// ============================================================
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  initAudio();
  let t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchcancel', function(e) {
  e.preventDefault();
  selectedSquare = null;
  validMoves = [];
}, { passive: false });

canvas.addEventListener('mousedown', function(e) {
  initAudio();
  handleTap(e.clientX, e.clientY);
});

function handleTap(tx, ty) {
  if (state === 'start') { startGame(); return; }
  if (state === 'gameover') { startGame(); return; }

  // Check undo button
  let belowY = boardY + boardSize + 15;
  let undoBtnX = 15, undoBtnY = belowY + 25, undoBtnW = 80, undoBtnH = 44;
  if (tx >= undoBtnX && tx <= undoBtnX + undoBtnW && ty >= undoBtnY && ty <= undoBtnY + undoBtnH) {
    undoMove();
    return;
  }

  // Check mute button
  let muteBtnX = W - 55, muteBtnY = belowY + 25, muteBtnW = 44, muteBtnH = 44;
  if (tx >= muteBtnX && tx <= muteBtnX + muteBtnW && ty >= muteBtnY && ty <= muteBtnY + muteBtnH) {
    muted = !muted;
    return;
  }

  // Board tap
  if (tx >= boardX && tx < boardX + boardSize && ty >= boardY && ty < boardY + boardSize) {
    let col = Math.floor((tx - boardX) / sqSize);
    let row = Math.floor((ty - boardY) / sqSize);
    if (col >= 0 && col < 8 && row >= 0 && row < 8) {
      let sq = String.fromCharCode(97 + col) + (8 - row);
      selectSquare(sq);
    }
  }
}

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (e.key === 'z' || e.key === 'Z') undoMove();
  if (e.key === 'm' || e.key === 'M') muted = !muted;
});

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  titlePulse += dt;

  if (scorePop > 0) scorePop -= dt;
  if (messageTimer > 0) messageTimer -= dt;

  // XP reporting
  if (state === 'playing' || state === 'thinking') {
    timer += dt;
    xpTimer += dt;
    if (xpTimer >= 60) { xpTimer -= 60; reportXP(); }
  }

  // Move animation
  if (moveAnim) {
    moveAnim.progress += dt / moveAnim.duration;
    if (moveAnim.progress >= 1) {
      moveAnim.progress = 1;
      if (moveAnim.callback) moveAnim.callback();
    }
  }

  // AI delay
  if (state === 'thinking' && !moveAnim) {
    aiDelay -= dt;
    if (aiDelay <= 0) {
      doAIMove();
    }
  }

  updateParticles(dt);
  updateFloatingTexts(dt);
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'start') {
    drawStartScreen();
    return;
  }

  if (state === 'gameover') {
    drawGameOverScreen();
    return;
  }

  // Playing / thinking states
  drawBackground();
  drawBoard();
  drawPieces();
  drawParticles();
  drawFloatingTexts();
  drawHUD();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// Fallback: keep game ticking when tab/iframe is hidden (rAF pauses)
setInterval(function() {
  if (document.hidden && (moveAnim || state === 'thinking')) {
    let now = performance.now();
    if (!lastTime) lastTime = now;
    let dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
  }
}, 50);
</script>
