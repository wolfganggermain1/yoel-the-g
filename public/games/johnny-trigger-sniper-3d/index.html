<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; width: 100vw; height: 100vh; height: 100dvh; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
// ============================================================
// PLATFORM THEME INTEGRATION
// ============================================================
let platformTheme = 'blue-light';
try {
  platformTheme = window.parent.document.documentElement.getAttribute('data-theme') || 'blue-light';
} catch(e) {}
const THEMES = {
  'blue-light':  { primary: '#3b82f6', dark: '#1e40af', bg: '#f0f7ff', surface: '#ffffff', text: '#1e293b', accent: '#93c5fd', glow: 'rgba(59,130,246,0.4)' },
  'blue-dark':   { primary: '#60a5fa', dark: '#2563eb', bg: '#0f172a', surface: '#1e293b', text: '#e2e8f0', accent: '#1e3a5f', glow: 'rgba(96,165,250,0.3)' },
  'red-light':   { primary: '#ef4444', dark: '#991b1b', bg: '#fff5f5', surface: '#ffffff', text: '#1e293b', accent: '#fca5a5', glow: 'rgba(239,68,68,0.4)' },
  'red-dark':    { primary: '#f87171', dark: '#dc2626', bg: '#1a0a0a', surface: '#2d1515', text: '#fecaca', accent: '#4a1515', glow: 'rgba(248,113,113,0.3)' },
};
const theme = THEMES[platformTheme] || THEMES['blue-light'];

// ============================================================
// XP REPORTING
// ============================================================
let xpTimer = 0;
function reportXP() {
  try { window.parent.postMessage({ type: 'xp', amount: 10 }, '*'); } catch(e) {}
}
function onGameOver(finalScore) {
  try { window.parent.postMessage({ type: 'gameOver', score: finalScore }, '*'); } catch(e) {}
}

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO ENGINE (Web Audio API)
// ============================================================
let audioCtx = null;
let muted = false;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
}
function playTone(freq, dur, type, vol, slide) {
  if (muted || !audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxShoot() { playTone(600, 0.08, 'square', 0.1, 900); }
function sfxHit() { playTone(300, 0.12, 'sawtooth', 0.12, 100); }
function sfxCollect() { playTone(800, 0.1, 'sine', 0.12, 1200); }
function sfxDamage() { playTone(150, 0.25, 'sawtooth', 0.15, 80); }
function sfxGameOver() {
  playTone(500, 0.15, 'square', 0.12, 300);
  setTimeout(() => playTone(300, 0.15, 'square', 0.12, 200), 150);
  setTimeout(() => playTone(150, 0.3, 'square', 0.12, 80), 300);
}
function sfxLevelUp() {
  playTone(523, 0.1, 'sine', 0.12);
  setTimeout(() => playTone(659, 0.1, 'sine', 0.12), 100);
  setTimeout(() => playTone(784, 0.1, 'sine', 0.12), 200);
  setTimeout(() => playTone(1047, 0.2, 'sine', 0.15), 300);
}
function sfxPowerup() { playTone(600, 0.08, 'sine', 0.1, 1000); setTimeout(() => playTone(1000, 0.15, 'sine', 0.12, 1400), 80); }
function sfxBossHit() { playTone(200, 0.15, 'sawtooth', 0.12, 80); playTone(250, 0.1, 'square', 0.08, 100); }

// ============================================================
// GAME CONSTANTS
// ============================================================
const MAX_LIVES = 2;
const MAX_PARTICLES = 50;
const POWERUP_INTERVAL_MIN = 20;
const POWERUP_INTERVAL_MAX = 30;

// Level configurations
const LEVELS = [
  { name: 'Downtown', spawnRate: 1.8, enemySpeed: 140, maxEnemies: 5, bossEvery: 3, killsToAdvance: 15, bgHue: 25 },
  { name: 'Midtown', spawnRate: 1.4, enemySpeed: 180, maxEnemies: 7, bossEvery: 3, killsToAdvance: 25, bgHue: 15 },
  { name: 'Uptown', spawnRate: 1.0, enemySpeed: 220, maxEnemies: 10, bossEvery: 2, killsToAdvance: 35, bgHue: 35 },
  { name: 'Sky District', spawnRate: 0.8, enemySpeed: 250, maxEnemies: 12, bossEvery: 2, killsToAdvance: 45, bgHue: 210 },
];

// ============================================================
// GAME STATE
// ============================================================
let state = 'start'; // start, playing, levelCard, gameOver
let score = 0;
let lives = MAX_LIVES;
let level = 0;
let wave = 0;
let killCount = 0;
let totalKills = 0;
let levelCardTimer = 0;
let gameTime = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let nextPowerupTime = 0;
let scorePop = 0;
let titlePulse = 0;

// Active power-ups
let activePowerups = { rapidFire: 0, shield: 0, scoreMulti: 0 };
let rapidFireTimer = 0;
let shootCooldown = 0;
const BASE_COOLDOWN = 0.3;
const RAPID_COOLDOWN = 0.08;

// Autopilot
let autoPilot = false;
let autoTarget = null; // current locked enemy
let autoScanTimer = 0;
const AUTO_SCAN_RATE = 0.06; // re-evaluate target every 60ms
let autoLaserAlpha = 0; // animated targeting laser

// ============================================================
// OBJECT POOLS
// ============================================================
let projectiles = [];
let enemies = [];
let particles = [];
let powerups = [];
let floatingTexts = [];
let buildings = [];
let bgCars = [];

// Player
const player = { x: 0, y: 0, r: 22, angle: -Math.PI/2, recoil: 0 };

// Crosshair
let crosshairX = 0, crosshairY = 0, showCrosshair = false;

// ============================================================
// CITY BACKGROUND GENERATION
// ============================================================
function generateBuildings() {
  buildings = [];
  const count = Math.floor(W / 40) + 5;
  let x = -20;
  for (let i = 0; i < count; i++) {
    const w = 30 + Math.random() * 50;
    const h = 80 + Math.random() * (H * 0.4);
    const hue = [200, 210, 220, 180, 350, 30, 40][Math.floor(Math.random() * 7)];
    buildings.push({
      x, w, h,
      color: `hsl(${hue}, ${30 + Math.random()*30}%, ${25 + Math.random()*20}%)`,
      windowColor: `hsl(${50 + Math.random()*20}, 90%, ${70 + Math.random()*20}%)`,
      windows: Math.floor(w / 14),
      floors: Math.floor(h / 20),
      hasAntenna: Math.random() > 0.7,
    });
    x += w + 2 + Math.random() * 8;
  }
}

function generateCars() {
  bgCars = [];
  for (let i = 0; i < 4; i++) {
    bgCars.push({
      x: Math.random() * W,
      y: H - 50 - Math.random() * 10,
      speed: 20 + Math.random() * 40,
      dir: Math.random() > 0.5 ? 1 : -1,
      color: ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'][Math.floor(Math.random()*6)],
      w: 30 + Math.random() * 20,
    });
  }
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawText(text, x, y, size, color, align, bold) {
  ctx.font = `${bold ? 'bold ' : ''}${size}px Arial, sans-serif`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawTextOutline(text, x, y, size, color, outColor, align, bold) {
  ctx.font = `${bold ? 'bold ' : ''}${size}px Arial, sans-serif`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = Math.max(2, size / 8);
  ctx.strokeStyle = outColor;
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

// ============================================================
// CITY BACKGROUND RENDERING
// ============================================================
function drawSky(dt) {
  const lvl = LEVELS[level] || LEVELS[0];
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const hue = lvl.bgHue;
  grad.addColorStop(0, `hsl(${hue}, 60%, 55%)`);
  grad.addColorStop(0.4, `hsl(${(hue+20)%360}, 70%, 65%)`);
  grad.addColorStop(0.7, `hsl(${(hue+40)%360}, 80%, 75%)`);
  grad.addColorStop(1, `hsl(${(hue+50)%360}, 60%, 50%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sun
  const sunX = W * 0.8;
  const sunY = H * 0.15;
  const sunGrad = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 60);
  sunGrad.addColorStop(0, 'rgba(255,240,180,1)');
  sunGrad.addColorStop(0.5, 'rgba(255,200,100,0.4)');
  sunGrad.addColorStop(1, 'rgba(255,180,80,0)');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(sunX - 60, sunY - 60, 120, 120);

  // Clouds (simple)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const t = gameTime * 8;
  for (let i = 0; i < 4; i++) {
    const cx = ((t + i * W / 3) % (W + 200)) - 100;
    const cy = 40 + i * 35;
    ctx.beginPath();
    ctx.arc(cx, cy, 25, 0, Math.PI*2);
    ctx.arc(cx + 25, cy - 8, 20, 0, Math.PI*2);
    ctx.arc(cx + 50, cy, 22, 0, Math.PI*2);
    ctx.arc(cx + 20, cy + 5, 18, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBuildings() {
  const groundY = H - 40;
  for (const b of buildings) {
    const by = groundY - b.h;
    // Building body
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, by, b.w, b.h);
    // Windows
    ctx.fillStyle = b.windowColor;
    const wx = 4, wy = 6, ww = 6, wh = 8;
    for (let f = 0; f < b.floors; f++) {
      for (let wi = 0; wi < b.windows; wi++) {
        if (Math.random() > 0.15) {
          ctx.fillRect(b.x + wx + wi * 14, by + wy + f * 20, ww, wh);
        }
      }
    }
    // Antenna
    if (b.hasAntenna) {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w/2, by);
      ctx.lineTo(b.x + b.w/2, by - 20);
      ctx.stroke();
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(b.x + b.w/2, by - 22, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
  // Road
  ctx.fillStyle = '#444';
  ctx.fillRect(0, groundY, W, 40);
  // Road lines
  ctx.fillStyle = '#ff0';
  for (let x = ((gameTime * 30) % 40) - 40; x < W; x += 40) {
    ctx.fillRect(x, groundY + 18, 20, 4);
  }
}

function drawCars(dt) {
  for (const c of bgCars) {
    c.x += c.speed * c.dir * dt;
    if (c.x > W + 60) c.x = -60;
    if (c.x < -60) c.x = W + 60;
    // Car body
    ctx.fillStyle = c.color;
    drawRoundRect(c.x - c.w/2, c.y - 12, c.w, 14, 4);
    ctx.fill();
    // Car top
    ctx.fillStyle = c.color;
    drawRoundRect(c.x - c.w/4, c.y - 22, c.w/2, 12, 3);
    ctx.fill();
    // Wheels
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(c.x - c.w/3, c.y + 2, 5, 0, Math.PI*2);
    ctx.arc(c.x + c.w/3, c.y + 2, 5, 0, Math.PI*2);
    ctx.fill();
    // Window
    ctx.fillStyle = 'rgba(150,200,255,0.7)';
    drawRoundRect(c.x - c.w/5, c.y - 20, c.w * 0.38, 8, 2);
    ctx.fill();
  }
}

// ============================================================
// PLAYER RENDERING
// ============================================================
function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const r = player.r;
  const recoilOff = player.recoil * 4;

  // Shield effect
  if (activePowerups.shield > 0) {
    ctx.strokeStyle = `rgba(100,200,255,${0.4 + Math.sin(gameTime * 8) * 0.2})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px, py, r + 10 + Math.sin(gameTime * 6) * 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Platform
  ctx.fillStyle = '#555';
  drawRoundRect(px - 25, py + 10, 50, 12, 4);
  ctx.fill();

  // Body
  ctx.fillStyle = '#3498db';
  ctx.beginPath();
  ctx.arc(px, py - 2, r * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f0c987';
  ctx.beginPath();
  ctx.arc(px, py - r * 0.9, r * 0.45, 0, Math.PI * 2);
  ctx.fill();

  // Goggles
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(px - 5, py - r * 0.95, 4, 0, Math.PI * 2);
  ctx.arc(px + 5, py - r * 0.95, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#5bf';
  ctx.beginPath();
  ctx.arc(px - 5, py - r * 0.95, 2.5, 0, Math.PI * 2);
  ctx.arc(px + 5, py - r * 0.95, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Hat/helmet
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.arc(px, py - r * 1.15, r * 0.35, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(px - r * 0.5, py - r * 1.15, r, 4);

  // Zapper tool (arm pointing toward crosshair)
  const dx = crosshairX - px;
  const dy = crosshairY - py;
  const angle = Math.atan2(dy, dx);
  player.angle = angle;

  const armLen = 20 - recoilOff;
  const armX = px + Math.cos(angle) * 12;
  const armY = py - 2 + Math.sin(angle) * 12;

  ctx.strokeStyle = '#7f8c8d';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(armX, armY);
  ctx.lineTo(armX + Math.cos(angle) * armLen, armY + Math.sin(angle) * armLen);
  ctx.stroke();

  // Zapper tip glow
  const tipX = armX + Math.cos(angle) * armLen;
  const tipY = armY + Math.sin(angle) * armLen;
  ctx.fillStyle = activePowerups.rapidFire > 0 ? '#f39c12' : '#3498db';
  ctx.beginPath();
  ctx.arc(tipX, tipY, 4 + Math.sin(gameTime * 10) * 1, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// PROJECTILE
// ============================================================
function spawnProjectile(tx, ty) {
  const angle = Math.atan2(ty - player.y, tx - player.x);
  const speed = 500;
  projectiles.push({
    x: player.x + Math.cos(angle) * 30,
    y: player.y + Math.sin(angle) * 30,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 5,
    life: 3,
    trail: [],
  });
  player.recoil = 1;
  sfxShoot();
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    // Trail
    p.trail.push({ x: p.x, y: p.y, a: 1 });
    if (p.trail.length > 8) p.trail.shift();
    for (const t of p.trail) t.a -= dt * 4;
    // Remove if off screen or expired
    if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20 || p.life <= 0) {
      projectiles.splice(i, 1);
    }
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    // Trail
    for (const t of p.trail) {
      if (t.a > 0) {
        ctx.fillStyle = `rgba(100,180,255,${t.a * 0.5})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, p.r * t.a * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Projectile
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2);
    glow.addColorStop(0, 'rgba(150,220,255,1)');
    glow.addColorStop(0.5, 'rgba(50,150,255,0.6)');
    glow.addColorStop(1, 'rgba(50,150,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// ENEMIES
// ============================================================
const ENEMY_TYPES = [
  { name: 'drone', r: 18, hp: 1, pts: 10, color: '#e74c3c', draw: drawDrone },
  { name: 'bot', r: 20, hp: 2, pts: 20, color: '#9b59b6', draw: drawBot },
  { name: 'orb', r: 14, hp: 1, pts: 15, color: '#e67e22', draw: drawOrb },
];

function spawnEnemy() {
  const lvl = LEVELS[level] || LEVELS[0];
  if (enemies.length >= lvl.maxEnemies) return;

  wave++;
  const isBoss = wave % lvl.bossEvery === 0;
  const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];

  let ex, ey, evx, evy;
  const side = Math.random();
  const spd = lvl.enemySpeed * (0.8 + Math.random() * 0.4);

  if (side < 0.6) { // Top
    ex = 40 + Math.random() * (W - 80);
    ey = -30;
    evx = (Math.random() - 0.5) * 60;
    evy = spd;
  } else if (side < 0.8) { // Left
    ex = -30;
    ey = 50 + Math.random() * (H * 0.4);
    evx = spd;
    evy = spd * 0.3 + Math.random() * 40;
  } else { // Right
    ex = W + 30;
    ey = 50 + Math.random() * (H * 0.4);
    evx = -spd;
    evy = spd * 0.3 + Math.random() * 40;
  }

  const e = {
    x: ex, y: ey, vx: evx, vy: evy,
    r: isBoss ? 35 : type.r,
    hp: isBoss ? 6 + level * 2 : type.hp,
    maxHp: isBoss ? 6 + level * 2 : type.hp,
    pts: isBoss ? 100 + level * 50 : type.pts,
    color: isBoss ? '#f1c40f' : type.color,
    type: type.name,
    isBoss,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 2 + Math.random() * 3,
    flashTimer: 0,
  };
  enemies.push(e);
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.wobble += e.wobbleSpeed * dt;
    e.x += (e.vx + Math.sin(e.wobble) * 30) * dt;
    e.y += e.vy * dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Off bottom = lose life
    if (e.y > H + 40) {
      enemies.splice(i, 1);
      if (activePowerups.shield <= 0) {
        lives--;
        sfxDamage();
        shakeDur = 0.2;
        if (lives <= 0) {
          state = 'gameOver';
          sfxGameOver();
          onGameOver(score);
        }
      }
    }
    // Off sides (only for ones that move sideways)
    if (e.x > W + 60 && e.vx > 0) enemies.splice(i, 1);
    else if (e.x < -60 && e.vx < 0) enemies.splice(i, 1);
  }
}

function drawDrone(e) {
  const flash = e.flashTimer > 0;
  ctx.fillStyle = flash ? '#fff' : e.color;
  // Body
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
  ctx.fill();
  // Propellers
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  const a = gameTime * 15;
  ctx.beginPath();
  ctx.moveTo(e.x - Math.cos(a) * e.r * 1.3, e.y - e.r * 0.6);
  ctx.lineTo(e.x + Math.cos(a) * e.r * 1.3, e.y - e.r * 0.6);
  ctx.stroke();
  // Eyes
  if (!flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x - 5, e.y - 2, 4, 0, Math.PI * 2);
    ctx.arc(e.x + 5, e.y - 2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(e.x - 4, e.y - 1, 2, 0, Math.PI * 2);
    ctx.arc(e.x + 6, e.y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBot(e) {
  const flash = e.flashTimer > 0;
  ctx.fillStyle = flash ? '#fff' : e.color;
  drawRoundRect(e.x - e.r, e.y - e.r, e.r * 2, e.r * 2, 6);
  ctx.fill();
  // Antenna
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(e.x, e.y - e.r);
  ctx.lineTo(e.x, e.y - e.r - 10);
  ctx.stroke();
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.arc(e.x, e.y - e.r - 12, 3, 0, Math.PI * 2);
  ctx.fill();
  // Face
  if (!flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x - 6, e.y - 4, 5, 0, Math.PI * 2);
    ctx.arc(e.x + 6, e.y - 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(e.x - 5, e.y - 3, 2.5, 0, Math.PI * 2);
    ctx.arc(e.x + 7, e.y - 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Mouth
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(e.x - 5, e.y + 5);
    ctx.lineTo(e.x + 5, e.y + 5);
    ctx.stroke();
  }
}

function drawOrb(e) {
  const flash = e.flashTimer > 0;
  const glow = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * 1.5);
  glow.addColorStop(0, flash ? '#fff' : e.color);
  glow.addColorStop(0.7, flash ? 'rgba(255,255,255,0.5)' : `${e.color}88`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r * 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = flash ? '#fff' : e.color;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
  ctx.fill();
  // Sparkle eyes
  if (!flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x - 3, e.y - 2, 3, 0, Math.PI * 2);
    ctx.arc(e.x + 3, e.y - 2, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBoss(e) {
  const flash = e.flashTimer > 0;
  // Glow aura
  ctx.fillStyle = `rgba(241,196,15,${0.15 + Math.sin(gameTime * 5) * 0.1})`;
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r + 15, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = flash ? '#fff' : '#f1c40f';
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
  ctx.fill();

  // Crown
  ctx.fillStyle = flash ? '#fff' : '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(e.x - 18, e.y - e.r + 5);
  ctx.lineTo(e.x - 12, e.y - e.r - 10);
  ctx.lineTo(e.x - 4, e.y - e.r + 2);
  ctx.lineTo(e.x + 4, e.y - e.r - 12);
  ctx.lineTo(e.x + 12, e.y - e.r + 2);
  ctx.lineTo(e.x + 18, e.y - e.r - 8);
  ctx.lineTo(e.x + 22, e.y - e.r + 5);
  ctx.closePath();
  ctx.fill();

  // Angry face
  if (!flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x - 10, e.y - 4, 7, 0, Math.PI * 2);
    ctx.arc(e.x + 10, e.y - 4, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.arc(e.x - 9, e.y - 3, 4, 0, Math.PI * 2);
    ctx.arc(e.x + 11, e.y - 3, 4, 0, Math.PI * 2);
    ctx.fill();
    // Eyebrows (angry)
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(e.x - 16, e.y - 14);
    ctx.lineTo(e.x - 5, e.y - 10);
    ctx.moveTo(e.x + 16, e.y - 14);
    ctx.lineTo(e.x + 5, e.y - 10);
    ctx.stroke();
    // Mouth
    ctx.beginPath();
    ctx.arc(e.x, e.y + 10, 8, 0, Math.PI);
    ctx.stroke();
  }

  // HP bar
  const hpPct = e.hp / e.maxHp;
  ctx.fillStyle = '#333';
  drawRoundRect(e.x - 25, e.y - e.r - 22, 50, 6, 3);
  ctx.fill();
  ctx.fillStyle = hpPct > 0.5 ? '#2ecc71' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
  drawRoundRect(e.x - 25, e.y - e.r - 22, 50 * hpPct, 6, 3);
  ctx.fill();
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.isBoss) { drawBoss(e); continue; }
    if (e.type === 'drone') drawDrone(e);
    else if (e.type === 'bot') drawBot(e);
    else drawOrb(e);
  }
}

// ============================================================
// POWER-UPS
// ============================================================
const PU_TYPES = ['rapidFire', 'shield', 'scoreMulti', 'extraLife'];
const PU_COLORS = { rapidFire: '#f39c12', shield: '#3498db', scoreMulti: '#2ecc71', extraLife: '#e74c3c' };
const PU_ICONS = { rapidFire: 'ZAP', shield: 'SHD', scoreMulti: 'x2', extraLife: '+HP' };
const PU_DURATIONS = { rapidFire: 5, shield: 3, scoreMulti: 10, extraLife: 0 };

function spawnPowerup() {
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  powerups.push({
    x: 40 + Math.random() * (W - 80),
    y: -20,
    vy: 60 + Math.random() * 40,
    r: 16,
    type,
    pulse: 0,
  });
}

function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt;
    p.pulse += dt * 4;
    if (p.y > H + 30) { powerups.splice(i, 1); continue; }

    // Check collision with player
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.r + p.r + 5) {
      activatePowerup(p.type);
      spawnParticles(p.x, p.y, PU_COLORS[p.type], 10);
      powerups.splice(i, 1);
      sfxPowerup();
    }
  }
}

function activatePowerup(type) {
  if (type === 'extraLife') {
    lives = Math.min(lives + 1, MAX_LIVES + 2);
    addFloatingText(player.x, player.y - 30, '+1 LIFE', '#e74c3c');
  } else if (type === 'rapidFire') {
    activePowerups.rapidFire = PU_DURATIONS.rapidFire;
    addFloatingText(player.x, player.y - 30, 'RAPID FIRE!', '#f39c12');
  } else if (type === 'shield') {
    activePowerups.shield = PU_DURATIONS.shield;
    addFloatingText(player.x, player.y - 30, 'SHIELD!', '#3498db');
  } else if (type === 'scoreMulti') {
    activePowerups.scoreMulti = PU_DURATIONS.scoreMulti;
    addFloatingText(player.x, player.y - 30, 'x2 SCORE!', '#2ecc71');
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const pulse = 1 + Math.sin(p.pulse) * 0.15;
    const r = p.r * pulse;
    // Glow
    ctx.fillStyle = PU_COLORS[p.type] + '44';
    ctx.beginPath();
    ctx.arc(p.x, p.y, r + 8, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = PU_COLORS[p.type];
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    // Icon
    drawText(PU_ICONS[p.type], p.x, p.y, 10, '#fff', 'center', true);
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  const actual = Math.min(count, MAX_PARTICLES - particles.length);
  for (let i = 0; i < actual; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 180;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 4,
      life: 0.4 + Math.random() * 0.5,
      maxLife: 0.4 + Math.random() * 0.5,
      color,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// FLOATING TEXT
// ============================================================
function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1.2, maxLife: 1.2 });
}

function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.y -= 50 * dt;
    f.life -= dt;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  for (const f of floatingTexts) {
    const a = f.life / f.maxLife;
    const scale = 1 + (1 - a) * 0.3;
    ctx.globalAlpha = a;
    drawTextOutline(f.text, f.x, f.y, 18 * scale, f.color, '#000', 'center', true);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// COLLISION DETECTION
// ============================================================
function checkCollisions() {
  for (let pi = projectiles.length - 1; pi >= 0; pi--) {
    const p = projectiles[pi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = p.x - e.x;
      const dy = p.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < p.r + e.r) {
        // Hit!
        e.hp--;
        e.flashTimer = 0.1;
        projectiles.splice(pi, 1);

        if (e.hp <= 0) {
          // Destroyed
          const pts = e.pts * (activePowerups.scoreMulti > 0 ? 2 : 1);
          score += pts;
          scorePop = 0.3;
          killCount++;
          totalKills++;
          addFloatingText(e.x, e.y - 10, `+${pts}`, e.isBoss ? '#f1c40f' : '#fff');
          spawnParticles(e.x, e.y, e.color, e.isBoss ? 20 : 8);
          if (e.isBoss) sfxBossHit(); else sfxHit();
          enemies.splice(ei, 1);

          // Check level advance
          const lvl = LEVELS[level];
          if (lvl && killCount >= lvl.killsToAdvance && level < LEVELS.length - 1) {
            level++;
            killCount = 0;
            wave = 0;
            state = 'levelCard';
            levelCardTimer = 2;
            sfxLevelUp();
          }
        } else {
          if (e.isBoss) sfxBossHit(); else sfxHit();
          shakeDur = 0.08;
        }
        break;
      }
    }
  }
}

// ============================================================
// AUTOPILOT SYSTEM
// ============================================================
function getAutoPilotTarget() {
  // Prioritize: bosses first, then closest to bottom (most threatening)
  let best = null;
  let bestScore = -Infinity;
  for (const e of enemies) {
    // Only target enemies on screen
    if (e.x < -10 || e.x > W + 10 || e.y < -10) continue;
    // Score: higher y = more dangerous; bosses get big bonus
    let threat = e.y * 2 + (e.isBoss ? 500 : 0);
    // Slight preference for enemies closer to center-x (easier angles)
    threat -= Math.abs(e.x - player.x) * 0.3;
    if (threat > bestScore) {
      bestScore = threat;
      best = e;
    }
  }
  return best;
}

function updateAutoPilot(dt) {
  if (!autoPilot || state !== 'playing') {
    if (autoLaserAlpha > 0) autoLaserAlpha = Math.max(0, autoLaserAlpha - dt * 6);
    return;
  }

  autoLaserAlpha = Math.min(1, autoLaserAlpha + dt * 5);
  autoScanTimer -= dt;

  // Re-evaluate target periodically or if current target is gone
  if (autoScanTimer <= 0 || !autoTarget || !enemies.includes(autoTarget)) {
    autoTarget = getAutoPilotTarget();
    autoScanTimer = AUTO_SCAN_RATE;
  }

  if (!autoTarget) return;

  // Lead the target: predict where enemy will be when projectile arrives
  const dx = autoTarget.x - player.x;
  const dy = autoTarget.y - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const projSpeed = 500;
  const travelTime = dist / projSpeed;
  // Predicted position
  const predX = autoTarget.x + (autoTarget.vx + Math.sin(autoTarget.wobble) * 30) * travelTime * 0.6;
  const predY = autoTarget.y + autoTarget.vy * travelTime * 0.6;

  // Move crosshair smoothly toward predicted position
  const lerpSpeed = 12;
  crosshairX += (predX - crosshairX) * Math.min(1, lerpSpeed * dt);
  crosshairY += (predY - crosshairY) * Math.min(1, lerpSpeed * dt);
  showCrosshair = true;

  // Auto-fire when cooldown is ready
  if (shootCooldown <= 0) {
    shoot(crosshairX, crosshairY);
  }
}

function drawAutoPilotEffects() {
  if (!autoPilot || !autoTarget || state !== 'playing') return;

  const a = autoLaserAlpha * (0.3 + Math.sin(gameTime * 12) * 0.15);

  // Targeting laser line from player to target
  ctx.save();
  ctx.strokeStyle = `rgba(0, 255, 180, ${a})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.lineDashOffset = -gameTime * 60;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 10);
  ctx.lineTo(autoTarget.x, autoTarget.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Target lock diamond around enemy
  const t = gameTime * 3;
  const lockR = autoTarget.r + 10 + Math.sin(t * 2) * 3;
  ctx.save();
  ctx.translate(autoTarget.x, autoTarget.y);
  ctx.rotate(t * 0.5);
  ctx.strokeStyle = `rgba(0, 255, 180, ${autoLaserAlpha * 0.7})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -lockR);
  ctx.lineTo(lockR, 0);
  ctx.lineTo(0, lockR);
  ctx.lineTo(-lockR, 0);
  ctx.closePath();
  ctx.stroke();
  // Corner brackets
  const br = lockR * 0.7;
  ctx.strokeStyle = `rgba(0, 255, 180, ${autoLaserAlpha * 0.5})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  // top-left
  ctx.beginPath();
  ctx.moveTo(-br, -br + 5); ctx.lineTo(-br, -br); ctx.lineTo(-br + 5, -br);
  ctx.stroke();
  // top-right
  ctx.beginPath();
  ctx.moveTo(br - 5, -br); ctx.lineTo(br, -br); ctx.lineTo(br, -br + 5);
  ctx.stroke();
  // bottom-right
  ctx.beginPath();
  ctx.moveTo(br, br - 5); ctx.lineTo(br, br); ctx.lineTo(br - 5, br);
  ctx.stroke();
  // bottom-left
  ctx.beginPath();
  ctx.moveTo(-br + 5, br); ctx.lineTo(-br, br); ctx.lineTo(-br, br - 5);
  ctx.stroke();
  ctx.restore();
}

// ============================================================
// INPUT HANDLING
// ============================================================
let inputActive = false;
let muteBtn = { x: 0, y: 0, r: 20 };

function handleInputDown(x, y) {
  initAudio();

  // Check mute button (always active)
  muteBtn.x = W - 35;
  muteBtn.y = H - 70;
  const mdx = x - muteBtn.x;
  const mdy = y - muteBtn.y;
  if (Math.sqrt(mdx*mdx + mdy*mdy) < muteBtn.r + 10) {
    muted = !muted;
    return;
  }

  // Check autopilot button (above mute)
  const apX = W - 35;
  const apY = H - 95;
  const adx = x - apX;
  const ady = y - apY;
  if (Math.sqrt(adx*adx + ady*ady) < 25) {
    autoPilot = !autoPilot;
    if (!autoPilot) { autoTarget = null; autoLaserAlpha = 0; showCrosshair = false; }
    return;
  }

  if (state === 'start') {
    startGame();
    return;
  }
  if (state === 'gameOver') {
    startGame();
    return;
  }
  if (state === 'playing') {
    crosshairX = x;
    crosshairY = y;
    showCrosshair = true;
    shoot(x, y);
  }
}

function handleInputMove(x, y) {
  if (state === 'playing') {
    crosshairX = x;
    crosshairY = y;
    showCrosshair = true;
  }
}

function handleInputUp() {
  showCrosshair = false;
}

function shoot(tx, ty) {
  if (shootCooldown > 0) return;
  spawnProjectile(tx, ty);
  shootCooldown = activePowerups.rapidFire > 0 ? RAPID_COOLDOWN : BASE_COOLDOWN;
}

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  handleInputDown(t.clientX, t.clientY);
  inputActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (inputActive) {
    const t = e.touches[0];
    handleInputMove(t.clientX, t.clientY);
    // Auto-fire while dragging
    if (state === 'playing' && shootCooldown <= 0) {
      shoot(t.clientX, t.clientY);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  inputActive = false;
  handleInputUp();
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => { e.preventDefault(); inputActive = false; handleInputUp(); }, { passive: false });

// Mouse events
canvas.addEventListener('mousedown', (e) => {
  handleInputDown(e.clientX, e.clientY);
  inputActive = true;
});

canvas.addEventListener('mousemove', (e) => {
  if (inputActive) {
    handleInputMove(e.clientX, e.clientY);
    if (state === 'playing' && shootCooldown <= 0) {
      shoot(e.clientX, e.clientY);
    }
  }
  crosshairX = e.clientX;
  crosshairY = e.clientY;
});

canvas.addEventListener('mouseup', () => {
  inputActive = false;
  handleInputUp();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    if (state === 'start' || state === 'gameOver') {
      initAudio();
      startGame();
    }
  }
  if (e.code === 'KeyM') {
    muted = !muted;
  }
  if (e.code === 'KeyA') {
    autoPilot = !autoPilot;
    if (!autoPilot) { autoTarget = null; autoLaserAlpha = 0; showCrosshair = false; }
  }
});

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  score = 0;
  lives = MAX_LIVES;
  level = 0;
  wave = 0;
  killCount = 0;
  totalKills = 0;
  projectiles = [];
  enemies = [];
  particles = [];
  powerups = [];
  floatingTexts = [];
  activePowerups = { rapidFire: 0, shield: 0, scoreMulti: 0 };
  shootCooldown = 0;
  gameTime = 0;
  xpTimer = 0;
  nextPowerupTime = POWERUP_INTERVAL_MIN + Math.random() * (POWERUP_INTERVAL_MAX - POWERUP_INTERVAL_MIN);

  player.x = W / 2;
  player.y = H - 80;
  crosshairX = W / 2;
  crosshairY = H / 2;

  generateBuildings();
  generateCars();

  state = 'levelCard';
  levelCardTimer = 2;
  sfxLevelUp();
}

// ============================================================
// ENEMY SPAWN TIMER
// ============================================================
let spawnTimer = 0;

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gameTime += dt;
  titlePulse += dt;

  // Update player position
  player.x = W / 2;
  player.y = H - 80;

  // Screen shake decay
  if (shakeDur > 0) {
    shakeDur -= dt;
    shakeX = (Math.random() - 0.5) * 5;
    shakeY = (Math.random() - 0.5) * 5;
  } else {
    shakeX = shakeY = 0;
  }

  // Score pop decay
  if (scorePop > 0) scorePop -= dt;

  // Recoil decay
  if (player.recoil > 0) player.recoil = Math.max(0, player.recoil - dt * 8);

  // Shoot cooldown
  if (shootCooldown > 0) shootCooldown -= dt;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // ---- STATE: START ----
  if (state === 'start') {
    drawStartScreen();
    ctx.restore();
    return;
  }

  // ---- STATE: LEVEL CARD ----
  if (state === 'levelCard') {
    levelCardTimer -= dt;
    drawLevelCard();
    if (levelCardTimer <= 0) {
      state = 'playing';
      spawnTimer = 0.5;
    }
    ctx.restore();
    return;
  }

  // ---- STATE: GAME OVER ----
  if (state === 'gameOver') {
    updateParticles(dt);
    updateFloatingTexts(dt);
    drawGameOverScreen();
    drawParticles();
    drawFloatingTexts();
    ctx.restore();
    return;
  }

  // ---- STATE: PLAYING ----
  // XP timer
  xpTimer += dt;
  if (xpTimer >= 60) {
    xpTimer = 0;
    reportXP();
  }

  // Power-up timers
  for (const key of ['rapidFire', 'shield', 'scoreMulti']) {
    if (activePowerups[key] > 0) activePowerups[key] = Math.max(0, activePowerups[key] - dt);
  }

  // Power-up spawn
  nextPowerupTime -= dt;
  if (nextPowerupTime <= 0) {
    spawnPowerup();
    nextPowerupTime = POWERUP_INTERVAL_MIN + Math.random() * (POWERUP_INTERVAL_MAX - POWERUP_INTERVAL_MIN);
  }

  // Enemy spawning
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnEnemy();
    const lvl = LEVELS[level] || LEVELS[0];
    spawnTimer = lvl.spawnRate * (0.7 + Math.random() * 0.6);
  }

  // Autopilot targeting + auto-fire
  updateAutoPilot(dt);

  // Updates
  updateProjectiles(dt);
  updateEnemies(dt);
  updatePowerups(dt);
  updateParticles(dt);
  updateFloatingTexts(dt);
  checkCollisions();

  // Draw scene
  drawSky(dt);
  drawBuildings();
  drawCars(dt);
  drawPowerups();
  drawAutoPilotEffects();
  drawEnemies();
  drawProjectiles();
  drawPlayer();
  drawParticles();
  drawFloatingTexts();
  drawCrosshair();
  drawHUD();

  ctx.restore();
}

// Initialize
generateBuildings();
generateCars();
crosshairX = W / 2;
crosshairY = H / 2;
requestAnimationFrame(gameLoop);
</script>
